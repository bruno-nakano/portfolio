services:
  - type: web
    name: brunofolio
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: JWT_SECRET
        generateValue: true
